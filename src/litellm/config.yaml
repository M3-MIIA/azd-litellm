# LiteLLM config.yaml file
# Place any configuration parameters you need for LiteLLM here

model_list:
  # OpenAI models
  - model_name: gpt-5
    litellm_params:
      model: openai/gpt-5
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-5-mini
    litellm_params:
      model: openai/gpt-5-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-5.1
    litellm_params:
      model: openai/gpt-5.1
      api_key: os.environ/OPENAI_API_KEY

  # Anthropic models
  - model_name: claude-sonnet-4-5
    litellm_params:
      model: anthropic/claude-sonnet-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  # Azure AI Foundry models
  - model_name: gpt-4.1-mini
    litellm_params:
      model: azure/gpt-4.1-mini
      api_key: os.environ/AZURE_AI_FOUNDRY_API_KEY
      api_base: os.environ/AZURE_AI_FOUNDRY_API_BASE
      api_version: "2025-01-01-preview"

  - model_name: gpt-4o
    litellm_params:
      model: azure/gpt-4o
      api_key: os.environ/AZURE_AI_FOUNDRY_API_KEY
      api_base: os.environ/AZURE_AI_FOUNDRY_API_BASE
      api_version: "2025-01-01-preview"

  - model_name: gpt-4.1
    litellm_params:
      model: azure/gpt-4.1-2025-04-14
      api_key: os.environ/AZURE_AI_FOUNDRY_API_KEY
      api_base: os.environ/AZURE_AI_FOUNDRY_API_BASE
      api_version: "2025-01-01-preview"

  - model_name: text-embedding-3-large
    litellm_params:
      model: azure/text-embedding-3-large
      api_key: os.environ/AZURE_AI_FOUNDRY_API_KEY
      api_base: os.environ/AZURE_AI_FOUNDRY_API_BASE
      api_version: "2025-01-01-preview"

  # Groq models
  - model_name: whisper-large-v3-turbo
    litellm_params:
      model: groq/whisper-large-v3-turbo
      api_key: os.environ/GROQ_API_KEY